name: test
on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  test-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: moguri/setup-blender@v1
        with:
          blender-version: "4.5"

      - run: blender --version

      - name: Checkout Addon
        uses: actions/checkout@v4
        with:
          path: CAD_Sketcher

      - name: Validate Extension
        run: blender --background --command extension validate
        working-directory: ./CAD_Sketcher

      - name: Build Extension
        run: blender --background --command extension build --output-filepath ./CAD_Sketcher.zip
        working-directory: ./CAD_Sketcher

      - name: Install Extension
        run: blender --background --command extension install-file --repo user_default --enable ./CAD_Sketcher.zip
        working-directory: ./CAD_Sketcher

      - name: Run Tests
        # Runs the FULL suite against the installed extension and fails the job
        # on any test failure (the old slvs_test invocation swallowed both).
        env:
          CAD_SKETCHER_SRC: ${{ github.workspace }}/CAD_Sketcher
        run: blender --background --python ./scripts/ci_run_tests.py
        working-directory: ./CAD_Sketcher
