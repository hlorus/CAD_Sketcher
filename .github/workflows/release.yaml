name: release

# Two extension channels, published to hlorus/CAD_Sketcher-extensions:
#   stable/index.json  - curated releases, cut by pushing a version tag (v*)
#   latest/index.json  - rolling build, rebuilt on every push to main
# Stable zips are normal GitHub release assets; the latest zip is a single
# rolling pre-release ("latest") whose asset is overwritten each commit.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore: # docs/workflow-only commits don't need a latest build
      - "**.md"
      - "docs/**"
      - ".github/**"
  workflow_dispatch:
    inputs:
      run_latest:
        description: "Build and publish to the 'latest' channel"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # === Stable channel: version tag -> GitHub Release ===
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Addon
        uses: actions/checkout@v4
        with:
          path: CAD_Sketcher

      - name: Check tag matches version
        working-directory: ./CAD_Sketcher
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          tag="${TAG_NAME#v}"
          manifest=$(grep -m1 '^version' blender_manifest.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag='$tag'  manifest='$manifest'"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag '$tag' does not match manifest version '$manifest'"
            exit 1
          fi
          # Legacy bl_info (present on the stable line) must agree on X.Y.Z.
          if grep -qE '"version"[[:space:]]*:[[:space:]]*\(' __init__.py; then
            blinfo=$(grep -oE '"version"[[:space:]]*:[[:space:]]*\([0-9]+,[[:space:]]*[0-9]+,[[:space:]]*[0-9]+\)' __init__.py \
              | head -1 | grep -oE '[0-9]+' | paste -sd.)
            base="${manifest%%-*}"
            if [ -n "$blinfo" ] && [ "$blinfo" != "$base" ]; then
              echo "::error::bl_info version '$blinfo' does not match manifest '$base'"
              exit 1
            fi
            echo "bl_info='$blinfo' matches manifest"
          fi

      - uses: moguri/setup-blender@v1
        with:
          blender-version: "4.5"

      - run: blender --version

      - name: Validate Extension
        run: blender --background --command extension validate
        working-directory: ./CAD_Sketcher

      - name: Build Extension
        run: >-
          blender --background --command extension build
          --output-filepath "${{ github.workspace }}/CAD_Sketcher-${{ github.ref_name }}.zip"
        working-directory: ./CAD_Sketcher

      - name: Detect pre-release
        id: pre
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: CAD_Sketcher-${{ github.ref_name }}.zip
          prerelease: ${{ steps.pre.outputs.prerelease }}
          generate_release_notes: true

  # Rebuild stable/index.json from the tagged (non-pre-release) releases.
  publish-stable:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    concurrency:
      group: extension-listing
      cancel-in-progress: false
    steps:
      - uses: moguri/setup-blender@v1
        with:
          blender-version: "4.5"

      - name: Download stable release zips
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p zips
          gh release list --repo "${{ github.repository }}" --limit 200 \
            --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease == false) | .tagName' > tags.txt
          while read -r tag; do
            [ -z "$tag" ] && continue
            gh release download "$tag" --repo "${{ github.repository }}" \
              --pattern '*.zip' --dir zips --skip-existing || true
          done < tags.txt
          echo "Stable zips:"; ls -la zips

      - name: Generate stable listing
        run: blender --background --command extension server-generate --repo-dir zips

      - name: Point archive URLs at the release assets
        env:
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, re
          repo = os.environ["REPO"]
          d = json.load(open("zips/index.json"))
          for e in d.get("data", []):
              fn = os.path.basename(e["archive_url"])
              m = re.match(r"CAD_Sketcher-(.+)\.zip$", fn)
              if not m:
                  raise SystemExit(f"unexpected asset name: {fn}")
              t = m.group(1)
              e["archive_url"] = f"https://github.com/{repo}/releases/download/{t}/{fn}"
          json.dump(d, open("zips/index.json", "w"), indent=2)
          print("stable:", [e["version"] for e in d["data"]])
          PY

      - name: Publish stable/index.json
        env:
          TOKEN: ${{ secrets.EXTENSIONS_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/hlorus/CAD_Sketcher-extensions.git" listing
          cd listing
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B main
          mkdir -p stable
          cp ../zips/index.json stable/index.json
          touch .nojekyll
          git add stable/index.json .nojekyll
          if git diff --cached --quiet; then
            echo "stable listing unchanged."
          else
            git commit -m "Update stable listing for ${{ github.ref_name }}"
            for i in 1 2 3; do
              git push origin main && break
              sleep 3; git fetch origin main && git rebase origin/main
            done
          fi

  # After a final (non-pre-release) tag, open the next dev cycle on main:
  # bump the manifest base (and legacy bl_info) to the next patch, so 'latest'
  # builds advertise as pre-releases of the upcoming version.
  bump-version:
    needs: release
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    concurrency:
      group: bump-version
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump base to next patch on main
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag="${TAG_NAME#v}"
          IFS='.' read -r MA MI PA <<< "${tag%%-*}"
          next="${MA}.${MI}.$((PA + 1))"
          echo "Released $tag; next dev base -> $next"

          # Idempotent: only advance if main still sits at the released base, so a
          # manual forward bump (e.g. to a minor/major) is never clobbered.
          cur=$(grep -m1 '^version' blender_manifest.toml | sed -E 's/.*"([^"]+)".*/\1/')
          cur="${cur%%-*}"
          if [ "$cur" != "$tag" ]; then
            echo "main base is '$cur', not '$tag' — already moved on, skipping."
            exit 0
          fi

          sed -i -E "s|^version = \".*\"|version = \"$next\"|" blender_manifest.toml
          # Keep legacy bl_info in sync when present (stable line only).
          if grep -qE '"version"[[:space:]]*:[[:space:]]*\(' __init__.py; then
            sed -i -E "s|(\"version\"[[:space:]]*:[[:space:]]*\()[0-9]+,[[:space:]]*[0-9]+,[[:space:]]*[0-9]+(\))|\1${MA}, ${MI}, $((PA + 1))\2|" __init__.py
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blender_manifest.toml __init__.py
          if git diff --cached --quiet; then
            echo "nothing to bump."
            exit 0
          fi
          git commit -m "Open development of $next"
          for i in 1 2 3; do
            git push origin main && break
            sleep 3; git fetch origin main && git rebase origin/main
          done

  # === Latest channel: every main commit -> rolling build ===
  latest:
    if: >-
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_latest)
    runs-on: ubuntu-latest
    concurrency:
      group: extension-listing
      cancel-in-progress: false
    steps:
      - name: Checkout Addon
        uses: actions/checkout@v4
        with:
          path: CAD_Sketcher

      - uses: moguri/setup-blender@v1
        with:
          blender-version: "4.5"

      - name: Stamp latest version
        # <base>-latest.<run_number>: monotonic, sorts below the eventual stable.
        working-directory: ./CAD_Sketcher
        run: |
          base=$(grep -m1 '^version' blender_manifest.toml | sed -E 's/.*"([^"]+)".*/\1/')
          base="${base%%-*}"          # strip any existing pre-release suffix
          ver="${base}-latest.${{ github.run_number }}"
          sed -i -E "s|^version = \".*\"|version = \"$ver\"|" blender_manifest.toml
          echo "LATEST_VERSION=$ver" >> "$GITHUB_ENV"
          echo "Latest version: $ver"

      - name: Validate Extension
        run: blender --background --command extension validate
        working-directory: ./CAD_Sketcher

      - name: Build latest
        run: >-
          blender --background --command extension build
          --output-filepath "${{ github.workspace }}/CAD_Sketcher-latest.zip"
        working-directory: ./CAD_Sketcher

      - name: Update rolling latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create latest --repo "${{ github.repository }}" --prerelease \
              --title "Latest (main)" \
              --notes "Rolling build of the newest main commit. Subscribe via the 'latest' extension channel." \
              --target "${{ github.sha }}"
          gh release upload latest "${{ github.workspace }}/CAD_Sketcher-latest.zip" \
            --repo "${{ github.repository }}" --clobber

      - name: Move the latest tag to this commit
        # --clobber only replaces the asset; force-move the ref so the tag and
        # the release re-anchor to the newest built commit.
        run: |
          git -C CAD_Sketcher tag -f latest "${{ github.sha }}"
          git -C CAD_Sketcher push -f origin latest

      - name: Generate latest listing
        run: |
          mkdir -p zips
          cp "${{ github.workspace }}/CAD_Sketcher-latest.zip" zips/
          blender --background --command extension server-generate --repo-dir zips

      - name: Point archive URL at the latest asset
        env:
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os
          repo = os.environ["REPO"]
          d = json.load(open("zips/index.json"))
          for e in d.get("data", []):
              e["archive_url"] = (
                  f"https://github.com/{repo}/releases/download/latest/CAD_Sketcher-latest.zip"
              )
          json.dump(d, open("zips/index.json", "w"), indent=2)
          print("latest:", [e["version"] for e in d["data"]])
          PY

      - name: Publish latest/index.json
        env:
          TOKEN: ${{ secrets.EXTENSIONS_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/hlorus/CAD_Sketcher-extensions.git" listing
          cd listing
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B main
          mkdir -p latest
          cp ../zips/index.json latest/index.json
          touch .nojekyll
          git add latest/index.json .nojekyll
          if git diff --cached --quiet; then
            echo "latest listing unchanged."
          else
            git commit -m "Latest -> ${LATEST_VERSION}"
            for i in 1 2 3; do
              git push origin main && break
              sleep 3; git fetch origin main && git rebase origin/main
            done
          fi
