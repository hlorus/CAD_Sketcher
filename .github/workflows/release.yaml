name: release

# Build the extension zip and attach it to a GitHub Release when a version tag
# is pushed. Tags with a pre-release suffix (e.g. v0.3.0-beta.1) are published
# as GitHub pre-releases. Runs from whatever ref the tag points at, so the same
# workflow serves both the stable (main) and the refactor (native-curves) lines.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # manual runs build + validate only (no release)
    inputs:
      publish_listing:
        description: "Rebuild + publish the extension listing (index.json) from existing releases"
        type: boolean
        default: false

permissions:
  contents: write # required to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Addon
        uses: actions/checkout@v4
        with:
          path: CAD_Sketcher

      - name: Check tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ./CAD_Sketcher
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          tag="${TAG_NAME#v}"
          manifest=$(grep -m1 '^version' blender_manifest.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag='$tag'  manifest='$manifest'"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag '$tag' does not match manifest version '$manifest'"
            exit 1
          fi
          # Legacy bl_info (present on the stable line) must agree on X.Y.Z.
          if grep -qE '"version"[[:space:]]*:[[:space:]]*\(' __init__.py; then
            blinfo=$(grep -oE '"version"[[:space:]]*:[[:space:]]*\([0-9]+,[[:space:]]*[0-9]+,[[:space:]]*[0-9]+\)' __init__.py \
              | head -1 | grep -oE '[0-9]+' | paste -sd.)
            base="${manifest%%-*}"  # strip any pre-release suffix; bl_info is numeric-only
            if [ -n "$blinfo" ] && [ "$blinfo" != "$base" ]; then
              echo "::error::bl_info version '$blinfo' does not match manifest '$base'"
              exit 1
            fi
            echo "bl_info='$blinfo' matches manifest"
          fi

      - uses: moguri/setup-blender@v1
        with:
          blender-version: "4.5"

      - run: blender --version

      - name: Validate Extension
        run: blender --background --command extension validate
        working-directory: ./CAD_Sketcher

      - name: Build Extension
        run: >-
          blender --background --command extension build
          --output-filepath "${{ github.workspace }}/CAD_Sketcher-${{ github.ref_name }}.zip"
        working-directory: ./CAD_Sketcher

      - name: Detect pre-release
        id: pre
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CAD_Sketcher-${{ github.ref_name }}.zip
          prerelease: ${{ steps.pre.outputs.prerelease }}
          generate_release_notes: true

  # Regenerate the extension-repository listings and push them to the
  # hlorus/CAD_Sketcher-extensions repo, so users get in-app updates. Two
  # channels, both rebuilt from the full release list on every run:
  #   latest/index.json - every release (newest wins, includes pre-releases)
  #   stable/index.json - non-pre-release versions only
  # The zips stay as GitHub release assets (archive_url points there).
  publish-listing:
    needs: release
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_listing)
    runs-on: ubuntu-latest
    steps:
      - uses: moguri/setup-blender@v1
        with:
          blender-version: "4.5"

      - name: Download all release zips
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p zips
          # tag <tab> isPrerelease, for every release.
          gh release list --repo "${{ github.repository }}" --limit 200 \
            --json tagName,isPrerelease \
            --jq '.[] | [.tagName, (.isPrerelease|tostring)] | @tsv' > releases.tsv
          while IFS=$'\t' read -r tag pre; do
            [ -z "$tag" ] && continue
            gh release download "$tag" --repo "${{ github.repository }}" \
              --pattern '*.zip' --dir zips --skip-existing || true
          done < releases.tsv
          echo "Releases:"; cat releases.tsv; echo "Zips:"; ls -la zips

      - name: Generate listing
        run: blender --background --command extension server-generate --repo-dir zips

      - name: Build stable + latest indexes
        # latest = every release; stable = non-pre-release only. archive_url is
        # rewritten to point at the GitHub release assets (hash/size stay valid).
        env:
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, re
          repo = os.environ["REPO"]
          prerelease = {
              ln.split("\t")[0]
              for ln in open("releases.tsv")
              if ln.rstrip("\n").endswith("\ttrue")
          }
          def tag_of(entry):
              fn = os.path.basename(entry["archive_url"])
              m = re.match(r"CAD_Sketcher-(.+)\.zip$", fn)
              if not m:
                  raise SystemExit(f"unexpected asset name: {fn}")
              return m.group(1)

          data = json.load(open("zips/index.json"))
          for e in data.get("data", []):
              t = tag_of(e)
              e["archive_url"] = (
                  f"https://github.com/{repo}/releases/download/{t}/CAD_Sketcher-{t}.zip"
              )

          os.makedirs("out", exist_ok=True)
          # latest: all entries
          json.dump(data, open("out/latest.json", "w"), indent=2)
          # stable: drop pre-release entries
          stable = dict(data)
          stable["data"] = [e for e in data["data"] if tag_of(e) not in prerelease]
          json.dump(stable, open("out/stable.json", "w"), indent=2)

          print("latest:", [e["version"] for e in data["data"]])
          print("stable:", [e["version"] for e in stable["data"]])
          PY

      - name: Publish indexes to the listing repo
        env:
          TOKEN: ${{ secrets.EXTENSIONS_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/hlorus/CAD_Sketcher-extensions.git" listing
          cd listing
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B main            # handles the initially-empty repo
          mkdir -p stable latest
          cp ../out/stable.json stable/index.json
          cp ../out/latest.json latest/index.json
          touch .nojekyll                 # serve JSON verbatim (no Jekyll)
          git add stable/index.json latest/index.json .nojekyll
          if git diff --cached --quiet; then
            echo "Listings unchanged."
          else
            git commit -m "Update extension listings for ${{ github.ref_name }}"
            git push origin main
          fi
