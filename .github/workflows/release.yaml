name: release

# Build the extension zip and attach it to a GitHub Release when a version tag
# is pushed. Tags with a pre-release suffix (e.g. v0.3.0-beta.1) are published
# as GitHub pre-releases. Runs from whatever ref the tag points at, so the same
# workflow serves both the stable (main) and the refactor (native-curves) lines.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # manual runs build + validate only (no release)
    inputs:
      publish_listing:
        description: "Rebuild + publish the extension listing (index.json) from existing releases"
        type: boolean
        default: false

permissions:
  contents: write # required to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Addon
        uses: actions/checkout@v4
        with:
          path: CAD_Sketcher

      - name: Check tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ./CAD_Sketcher
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          tag="${TAG_NAME#v}"
          manifest=$(grep -m1 '^version' blender_manifest.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag='$tag'  manifest='$manifest'"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag '$tag' does not match manifest version '$manifest'"
            exit 1
          fi
          # Legacy bl_info (present on the stable line) must agree on X.Y.Z.
          if grep -qE '"version"[[:space:]]*:[[:space:]]*\(' __init__.py; then
            blinfo=$(grep -oE '"version"[[:space:]]*:[[:space:]]*\([0-9]+,[[:space:]]*[0-9]+,[[:space:]]*[0-9]+\)' __init__.py \
              | head -1 | grep -oE '[0-9]+' | paste -sd.)
            base="${manifest%%-*}"  # strip any pre-release suffix; bl_info is numeric-only
            if [ -n "$blinfo" ] && [ "$blinfo" != "$base" ]; then
              echo "::error::bl_info version '$blinfo' does not match manifest '$base'"
              exit 1
            fi
            echo "bl_info='$blinfo' matches manifest"
          fi

      - uses: moguri/setup-blender@v1
        with:
          blender-version: "4.5"

      - run: blender --version

      - name: Validate Extension
        run: blender --background --command extension validate
        working-directory: ./CAD_Sketcher

      - name: Build Extension
        run: >-
          blender --background --command extension build
          --output-filepath "${{ github.workspace }}/CAD_Sketcher-${{ github.ref_name }}.zip"
        working-directory: ./CAD_Sketcher

      - name: Detect pre-release
        id: pre
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CAD_Sketcher-${{ github.ref_name }}.zip
          prerelease: ${{ steps.pre.outputs.prerelease }}
          generate_release_notes: true

  # Regenerate the extension-repository listing (index.json) for the released
  # channel and push it to the hlorus/CAD_Sketcher-extensions repo, so users get
  # in-app updates. Stable tags -> stable/index.json, pre-releases -> latest/.
  # The zips themselves stay as GitHub release assets (archive_url points there).
  publish-listing:
    needs: release
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_listing)
    runs-on: ubuntu-latest
    steps:
      - uses: moguri/setup-blender@v1
        with:
          blender-version: "4.5"

      - name: Determine channel
        id: ch
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "channel=latest"   >> "$GITHUB_OUTPUT"
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable"   >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download this channel's release zips
        env:
          GH_TOKEN: ${{ github.token }}
          PRE: ${{ steps.ch.outputs.prerelease }}
        run: |
          mkdir -p zips
          gh release list --repo "${{ github.repository }}" --limit 200 \
            --json tagName,isPrerelease \
            --jq '.[] | [.tagName, (.isPrerelease|tostring)] | @tsv' > all.tsv
          while IFS=$'\t' read -r tag pre; do
            [ "$pre" = "$PRE" ] || continue
            gh release download "$tag" --repo "${{ github.repository }}" \
              --pattern '*.zip' --dir zips --skip-existing || true
          done < all.tsv
          echo "Zips for channel:"; ls -la zips

      - name: Generate listing
        run: blender --background --command extension server-generate --repo-dir zips

      - name: Point archive URLs at the release assets
        env:
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, re
          repo = os.environ["REPO"]
          path = "zips/index.json"
          data = json.load(open(path))
          for e in data.get("data", []):
              fn = os.path.basename(e["archive_url"])
              m = re.match(r"CAD_Sketcher-(.+)\.zip$", fn)
              if not m:
                  raise SystemExit(f"unexpected asset name: {fn}")
              tag = m.group(1)
              e["archive_url"] = f"https://github.com/{repo}/releases/download/{tag}/{fn}"
          json.dump(data, open(path, "w"), indent=2)
          for e in data["data"]:
              print(e["version"], "->", e["archive_url"])
          PY

      - name: Publish index.json to the listing repo
        env:
          TOKEN: ${{ secrets.EXTENSIONS_REPO_TOKEN }}
          CHANNEL: ${{ steps.ch.outputs.channel }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/hlorus/CAD_Sketcher-extensions.git" listing
          cd listing
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B main            # handles the initially-empty repo
          mkdir -p "$CHANNEL"
          cp ../zips/index.json "$CHANNEL/index.json"
          touch .nojekyll                 # serve JSON verbatim (no Jekyll)
          git add "$CHANNEL/index.json" .nojekyll
          if git diff --cached --quiet; then
            echo "Listing unchanged."
          else
            git commit -m "Update $CHANNEL listing for ${{ github.ref_name }}"
            git push origin main
          fi
